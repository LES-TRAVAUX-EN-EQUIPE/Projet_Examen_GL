<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - FuelTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../ressources/css/connexion.css">
</head>
<body>
  <section class="login-layout">
    <article class="login-brand-panel">
      <div class="brand-logo-wrap">
        <img src="../ressources/images/logo.png" alt="Logo FuelTrack">
      </div>
      <h1>FuelTrack</h1>
      <p>Espace de gestion securise</p>
      <span class="brand-chip"><i class="bi bi-shield-lock-fill"></i> Connexion securisee</span>
    </article>

    <article class="login-form-panel">
      <div class="login-form-head">
        <div>
          <h2>Connexion</h2>
          <p class="login-helper">Accedez a votre espace de gestion securise</p>
        </div>
        <button id="theme-btn" class="theme-btn" type="button" aria-label="Changer le theme">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <i class="bi bi-envelope-fill"></i>
            <input id="email" name="email" type="email" placeholder="Entrez votre email" required>
          </div>
        </div>
        <div class="form-group">
          <label for="mot_de_passe">Mot de passe</label>
          <div class="input-wrap">
            <i class="bi bi-lock-fill"></i>
            <input id="mot_de_passe" name="mot_de_passe" type="password" placeholder="Entrez votre mot de passe" required>
          </div>
        </div>
        <button type="submit">Se connecter</button>
        <p class="admin-only"><i class="bi bi-info-circle-fill"></i> Connectez-vous avec votre compte utilisateur autorise</p>
        <p id="message" class="message"></p>
      </form>

      <a class="back-home" href="../index.html">Retour a la page d'accueil</a>
    </article>
  </section>
  <script type="module" src="../ressources/js/connexion.js"></script>
</body>
</html>
