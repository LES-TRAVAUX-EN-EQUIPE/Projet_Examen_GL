<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Véhicules - Application Carburant</title>
    <link rel="stylesheet" href="../ressources/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">Menu Principal</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="vehicules.html">
                                <i class="fas fa-truck"></i> Véhicules
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="livraisons.html">
                                <i class="fas fa-boxes"></i> Livraisons
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Gestion des Véhicules de Livraison</h1>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#vehiculeModal" onclick="resetForm()">
                        <i class="fas fa-plus"></i> Nouveau Véhicule
                    </button>
                </div>

                <!-- Filtres -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <select id="filtreStatut" class="form-select" onchange="filtrerVehicules()">
                            <option value="">Tous les statuts</option>
                            <option value="disponible">Disponible</option>
                            <option value="en_livraison">En livraison</option>
                            <option value="en_maintenance">En maintenance</option>
                            <option value="hors_service">Hors service</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="searchInput" class="form-control" placeholder="Rechercher par immatriculation..." onkeyup="filtrerVehicules()">
                    </div>
                </div>

                <!-- Table des véhicules -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Immatriculation</th>
                                <th>Marque</th>
                                <th>Modèle</th>
                                <th>Capacité (L)</th>
                                <th>Statut</th>
                                <th>Kilométrage</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vehiculesTableBody">
                            <tr>
                                <td colspan="8" class="text-center">Chargement des données...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Formulaire Véhicule -->
    <div class="modal fade" id="vehiculeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Ajouter un véhicule</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="vehiculeForm">
                        <input type="hidden" id="vehiculeId">
                        <div class="mb-3">
                            <label for="immatriculation" class="form-label">Immatriculation *</label>
                            <input type="text" class="form-control" id="immatriculation" required>
                        </div>
                        <div class="mb-3">
                            <label for="marque" class="form-label">Marque *</label>
                            <input type="text" class="form-control" id="marque" required>
                        </div>
                        <div class="mb-3">
                            <label for="modele" class="form-label">Modèle *</label>
                            <input type="text" class="form-control" id="modele" required>
                        </div>
                        <div class="mb-3">
                            <label for="capacite_reservoir" class="form-label">Capacité réservoir (Litres) *</label>
                            <input type="number" step="0.01" class="form-control" id="capacite_reservoir" required>
                        </div>
                        <div class="mb-3">
                            <label for="consommation_moyenne" class="form-label">Consommation moyenne (L/100km)</label>
                            <input type="number" step="0.01" class="form-control" id="consommation_moyenne">
                        </div>
                        <div class="mb-3">
                            <label for="statut" class="form-label">Statut</label>
                            <select class="form-select" id="statut">
                                <option value="disponible">Disponible</option>
                                <option value="en_livraison">En livraison</option>
                                <option value="en_maintenance">En maintenance</option>
                                <option value="hors_service">Hors service</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="date_mise_en_service" class="form-label">Date mise en service</label>
                            <input type="date" class="form-control" id="date_mise_en_service">
                        </div>
                        <div class="mb-3">
                            <label for="kilometrage_actuel" class="form-label">Kilométrage actuel</label>
                            <input type="number" step="0.01" class="form-control" id="kilometrage_actuel">
                        </div>
                        <div class="mb-3">
                            <label for="derniere_maintenance" class="form-label">Dernière maintenance</label>
                            <input type="date" class="form-control" id="derniere_maintenance">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="saveVehicule()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/vehicules.js"></script>
</body>
</html>
