<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taux de change - FuelTrack</title>
  <link rel="stylesheet" href="../ressources/css/style.css">
  <link rel="stylesheet" href="../ressources/css/formulaires.css">
  <link rel="stylesheet" href="../ressources/css/tableaux.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2 class="brand">FuelTrack</h2>
    </aside>

    <main class="content">
      <div class="page-header">
        <h1>Taux de change station</h1>
      </div>

      <section class="card">
        <form id="taux-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="taux-station-id">Station</label>
              <select id="taux-station-id" name="station_id" required></select>
            </div>
            <div class="form-group">
              <label for="taux-usd-cdf">Taux USD -> CDF</label>
              <input type="number" id="taux-usd-cdf" name="taux_usd_cdf" min="0" step="0.01" required>
            </div>
            <div class="form-group">
              <label for="taux-date-application">Date d'application</label>
              <input type="datetime-local" id="taux-date-application" name="date_application" required>
            </div>
            <div class="form-group">
              <label for="taux-statut">Statut</label>
              <select id="taux-statut" name="statut">
                <option value="actif">Actif</option>
                <option value="inactif">Inactif</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Enregistrer le taux</button>
          </div>
          <p id="taux-notice" class="notice"></p>
        </form>
      </section>

      <section class="card" style="margin-top: 16px;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Station</th>
                <th>Taux USD/CDF</th>
                <th>Date application</th>
                <th>Statut</th>
              </tr>
            </thead>
            <tbody id="taux-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../ressources/js/auth_guard.js"></script>
  <script type="module" src="../ressources/js/taux_change_stations.js"></script>
</body>
</html>
