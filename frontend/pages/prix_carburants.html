<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarifs station - FuelTrack</title>
  <link rel="stylesheet" href="../ressources/css/style.css">
  <link rel="stylesheet" href="../ressources/css/formulaires.css">
  <link rel="stylesheet" href="../ressources/css/tableaux.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2 class="brand">FuelTrack</h2>
    </aside>

    <main class="content">
      <div class="page-header">
        <h1>Tarifs station</h1>
      </div>

      <section class="card">
        <form id="crud-form">
          <div id="form-body" class="form-grid"></div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <button class="btn btn-secondary" id="btn-reset" type="button">Reinitialiser</button>
          </div>
          <p id="notice" class="notice"></p>
        </form>
      </section>

      <section class="card" style="margin-top: 16px;">
        <div class="table-wrap">
          <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../ressources/js/auth_guard.js"></script>
  <script type="module" src="../ressources/js/prix_carburants.js"></script>
</body>
</html>
