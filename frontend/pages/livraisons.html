<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Livraisons - Application Carburant</title>
    <link rel="stylesheet" href="../ressources/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">Menu Principal</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="vehicules.html">
                                <i class="fas fa-truck"></i> Véhicules
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="livraisons.html">
                                <i class="fas fa-boxes"></i> Livraisons
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Gestion des Livraisons</h1>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#livraisonModal" onclick="resetForm()">
                        <i class="fas fa-plus"></i> Nouvelle Livraison
                    </button>
                </div>

                <!-- Statistiques -->
                <div class="row mb-4" id="statsContainer">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Total Livraisons</h5>
                                <p class="card-text display-4" id="totalLivraisons">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-warning mb-3">
                            <div class="card-body">
                                <h5 class="card-title">En cours</h5>
                                <p class="card-text display-4" id="enCoursLivraisons">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-success mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Livrées</h5>
                                <p class="card-text display-4" id="livreesLivraisons">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-danger mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Annulées</h5>
                                <p class="card-text display-4" id="annuleesLivraisons">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Filtres -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <select id="filtreStatut" class="form-select" onchange="filtrerLivraisons()">
                            <option value="">Tous les statuts</option>
                            <option value="planifiee">Planifiée</option>
                            <option value="en_cours">En cours</option>
                            <option value="livree">Livrée</option>
                            <option value="retard">Retard</option>
                            <option value="annulee">Annulée</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="date" id="filtreDate" class="form-control" placeholder="Date" onchange="filtrerLivraisons()">
                    </div>
                </div>

                <!-- Table des livraisons -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>N° Livraison</th>
                                <th>Véhicule</th>
                                <th>Départ</th>
                                <th>Destination</th>
                                <th>Quantité (L)</th>
                                <th>Statut</th>
                                <th>Date départ</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="livraisonsTableBody">
                            <tr>
                                <td colspan="8" class="text-center">Chargement des données...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Formulaire Livraison -->
    <div class="modal fade" id="livraisonModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nouvelle Livraison</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="livraisonForm">
                        <input type="hidden" id="livraisonId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="id_vehicule" class="form-label">Véhicule *</label>
                                <select class="form-select" id="id_vehicule" required>
                                    <option value="">Sélectionner un véhicule</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="id_depot_origine" class="form-label">Dépôt origine *</label>
                                <select class="form-select" id="id_depot_origine" required>
                                    <option value="">Sélectionner un dépôt</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="id_station_destination" class="form-label">Station destination *</label>
                                <select class="form-select" id="id_station_destination" required>
                                    <option value="">Sélectionner une station</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="quantite_prevue" class="form-label">Quantité prévue (Litres) *</label>
                                <input type="number" step="0.01" class="form-control" id="quantite_prevue" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="date_arrivee_prevue" class="form-label">Date arrivée prévue *</label>
                                <input type="datetime-local" class="form-control" id="date_arrivee_prevue" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="chauffeur_nom" class="form-label">Nom du chauffeur</label>
                                <input type="text" class="form-control" id="chauffeur_nom">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="chauffeur_contact" class="form-label">Contact chauffeur</label>
                                <input type="text" class="form-control" id="chauffeur_contact">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label for="remarques" class="form-label">Remarques</label>
                                <textarea class="form-control" id="remarques" rows="3"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="saveLivraison()">Planifier la livraison</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Gestion Statut -->
    <div class="modal fade" id="statutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Gérer la livraison</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="statutActions">
                        <button class="btn btn-success w-100 mb-2" onclick="demarrerLivraison()">
                            <i class="fas fa-play"></i> Démarrer la livraison
                        </button>
                        <button class="btn btn-primary w-100 mb-2" onclick="terminerLivraison()" data-bs-toggle="modal" data-bs-target="#terminerModal">
                            <i class="fas fa-check"></i> Terminer la livraison
                        </button>
                        <button class="btn btn-danger w-100" onclick="annulerLivraison()">
                            <i class="fas fa-times"></i> Annuler la livraison
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Terminer Livraison -->
    <div class="modal fade" id="terminerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Terminer la livraison</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="quantite_reelle" class="form-label">Quantité réellement livrée (Litres) *</label>
                        <input type="number" step="0.01" class="form-control" id="quantite_reelle" required>
                    </div>
                    <div class="mb-3">
                        <label for="date_arrivee_reelle" class="form-label">Date d'arrivée réelle</label>
                        <input type="datetime-local" class="form-control" id="date_arrivee_reelle">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="confirmerTerminer()">Terminer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/livraisons.js"></script>
</body>
</html>
